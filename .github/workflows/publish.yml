name: Publish Snapchain
on:
  push:
    tags:
      - 'v*'

concurrency: snapchain-publish

permissions:
  contents: read
  id-token: write # OIDC
  packages: write

jobs:
  build:
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_WRITE_PASSWORD }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Share the registry-backed cache with the main CI build (docker-build-impl.yml)
      # and the deployer. A release tag is cut from a main commit, so read that commit's
      # per-commit tag then fall back to main; write the per-commit tag so the deployer
      # gets a full hit when it deploys this exact release SHA. See NEYN-11876.
      - name: Compute cache refs
        id: cache
        env:
          ARCH: ${{ matrix.arch }}
          SHA: ${{ github.sha }}
        run: |
          repo="ghcr.io/farcasterxyz/snapchain/cache"
          {
            echo "from<<EOF"
            echo "type=registry,ref=${repo}:${ARCH}-${SHA}"
            echo "type=registry,ref=${repo}:${ARCH}-main"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          {
            echo "to<<EOF"
            echo "type=registry,mode=max,ref=${repo}:${ARCH}-${SHA}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/${{ matrix.arch }}
          outputs: type=image,name=farcasterxyz/snapchain,push-by-digest=true,name-canonical=true,push=true
          cache-from: ${{ steps.cache.outputs.from }}
          cache-to: ${{ steps.cache.outputs.to }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" > /tmp/digests/${{ matrix.arch }}

      - uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/${{ matrix.arch }}

  create-manifest:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v6

      - name: Extract version from Cargo.toml
        id: version
        run: echo "version=$(awk -F '"' '/^version =/ {print $2}' Cargo.toml)" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_WRITE_PASSWORD }}

      - name: Create and push multi-arch manifest
        run: |
          AMD64_DIGEST=$(cat /tmp/digests/amd64)
          ARM64_DIGEST=$(cat /tmp/digests/arm64)
          VERSION=${{ steps.version.outputs.version }}

          docker buildx imagetools create \
            -t farcasterxyz/snapchain:${VERSION} \
            -t farcasterxyz/snapchain:latest \
            farcasterxyz/snapchain@${AMD64_DIGEST} \
            farcasterxyz/snapchain@${ARM64_DIGEST}
