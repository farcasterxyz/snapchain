name: Docker Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'proto/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain*'
              - 'Dockerfile'
              - '.dockerignore'
              - '.github/workflows/docker-build.yml'
              - '.github/workflows/docker-build-impl.yml'

  build:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    uses: ./.github/workflows/docker-build-impl.yml
    secrets: inherit

  required:
    needs: [changes, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate docker build result
        run: |
          result="${{ needs.build.result }}"
          case "$result" in
            success|skipped)
              echo "Docker Build required check passing (build job: $result)"
              ;;
            *)
              echo "Docker Build required check failing (build job: $result)"
              exit 1
              ;;
          esac
