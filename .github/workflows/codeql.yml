name: "CodeQL Advanced"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '27 17 * * 2'
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze (rust)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
    - name: Install Protoc
      uses: arduino/setup-protoc@v3

    - name: Checkout snapchain
      uses: actions/checkout@v4
      with:
        path: ./snapchain
        fetch-depth: 0

    - name: Checkout malachite (path dependency)
      uses: actions/checkout@v4
      with:
        repository: informalsystems/malachite
        ref: 13bca14cd209d985c3adf101a02924acde8723a5
        path: ./malachite

    - name: Checkout eth-signature-verifier (path dependency)
      uses: actions/checkout@v4
      with:
        repository: CassOnMars/eth-signature-verifier
        path: ./eth-signature-verifier

    - name: Install Rust 1.95.0
      uses: actions-rs/toolchain@v1
      with:
        toolchain: 1.95.0
        profile: default
        override: true

    - name: Cache cargo registry + target
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: ./snapchain

    # Warm the target dir + fetch all deps so the buildless extractor (rust-analyzer)
    # has a fully resolvable workspace when it runs `cargo metadata`.
    - name: cargo check
      working-directory: ./snapchain
      env:
        RUSTFLAGS: "-Dwarnings -A mismatched_lifetime_syntaxes"
      run: cargo check --workspace --all-targets --locked

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: rust
        build-mode: none
        source-root: ./snapchain

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:rust"
