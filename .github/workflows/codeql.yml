name: "CodeQL Advanced"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '27 17 * * 2'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    timeout-minutes: 60
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: actions
          build-mode: none
        - language: javascript-typescript
          build-mode: none
        - language: rust
          build-mode: manual

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        path: ./snapchain
        fetch-depth: 0

    # --- Rust-only setup: mirror verify-impl.yml so `cargo build` actually succeeds ---
    - name: Install Protoc
      if: matrix.language == 'rust'
      uses: arduino/setup-protoc@v3

    - name: Checkout malachite (path dependency)
      if: matrix.language == 'rust'
      uses: actions/checkout@v4
      with:
        repository: informalsystems/malachite
        ref: 13bca14cd209d985c3adf101a02924acde8723a5
        path: ./malachite

    - name: Checkout eth-signature-verifier (path dependency)
      if: matrix.language == 'rust'
      uses: actions/checkout@v4
      with:
        repository: CassOnMars/eth-signature-verifier
        path: ./eth-signature-verifier

    - name: Install Rust 1.95.0
      if: matrix.language == 'rust'
      uses: actions-rs/toolchain@v1
      with:
        toolchain: 1.95.0
        profile: default
        override: true

    - name: Cache cargo registry + target
      if: matrix.language == 'rust'
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: ./snapchain

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        source-root: ./snapchain
        # queries: security-extended,security-and-quality

    - name: Run manual build (Rust)
      if: matrix.build-mode == 'manual' && matrix.language == 'rust'
      working-directory: ./snapchain
      env:
        RUSTFLAGS: "-Dwarnings -A mismatched_lifetime_syntaxes"
      run: cargo build --workspace --all-targets --locked

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"
